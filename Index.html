<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato Rápido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      font-size: 30px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .btn-whatsapp {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      background: #25D366;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 12px;
      transition: 0.3s;
      animation: pulse 1.5s infinite;
    }

    .btn-whatsapp:hover {
      background: #1ebe5d;
      transform: scale(1.05);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37,211,102, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(37,211,102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102, 0); }
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    📲 Fale Comigo
  </header>

  <div class="container">

    <div class="card">
      <h2>Atendimento rápido</h2>
      <p>Clique no botão abaixo e fale direto comigo no WhatsApp!</p>

      <a class="btn-whatsapp"
         href="https://wa.me/5512991439382?text=Olá,%20vim%20pelo%20seu%20site!"
         target="_blank">
         💬 Chamar no WhatsApp
      </a>
    </div>

    <div class="card">
      <h2>Resposta rápida ⚡</h2>
      <p>Normalmente respondo em poucos minutos 😉</p>
    </div>

  </div>

  <footer>
    © 2026 - Seu site
  </footer>

</body>
</html>
